services:
  ai-showcase:
    build: .
    ports:
      - "8000:8000"
    environment:
      AI_SHOWCASE_DATA_PATH: data/sample_feedback.csv
      AI_SHOWCASE_INDEX_PATH: .artifacts/vector_store.json
      AI_SHOWCASE_LLM_PROVIDER: local
    volumes:
      - ./.artifacts:/app/.artifacts

  # Optional local vector database. The app defaults to the JSON store and only
  # uses Qdrant when AI_SHOWCASE_VECTOR_STORE=qdrant. Start it with:
  #   docker compose up qdrant
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
